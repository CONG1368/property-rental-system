appId: com.property-rental.system
productName: 物业租赁综合管理系统
artifactName: ${productName}-${version}-${arch}.${ext}
directories:
  output: release
files:
  - dist/**/*
  - frontend/dist/**/*
  - package.json
extraResources:
  - from: backend/
    to: backend/
    filter:
      - dist/**/*
      - node_modules/**/*
      - package.json
  - from: runtime/node/
    to: runtime/node/
    filter:
      - "**/*"
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: 物业租赁综合管理系统
  # 安装/卸载时写入注册表，新版本自动读取旧安装路径实现覆盖升级
  installerHeaderIcon: build/icon.ico
  # 卸载时先关闭应用
  uninstallDisplayName: 物业租赁综合管理系统
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64
  sign: null
  signAndEditExecutable: false
asar: true
compression: maximum
